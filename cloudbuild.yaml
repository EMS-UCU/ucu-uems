options:
  substitutionOption: ALLOW_LOOSE

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - build
  - '--build-arg'
  - VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}
  - '--build-arg'
  - VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}
  - '--build-arg'
  - VITE_SENTRY_DSN=${_VITE_SENTRY_DSN}
  - '--build-arg'
  - VITE_SENTRY_ENV=${_VITE_SENTRY_ENV}
  - '-t'
  - gcr.io/$PROJECT_ID/ucu-uems
  - .

images:
- gcr.io/$PROJECT_ID/ucu-uems